<!DOCTYPE html>
<html>
<head>

<title>Voice → ISL Live Translator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.container{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border-radius:20px;
padding:40px;
width:720px;
text-align:center;
box-shadow:0 0 50px rgba(0,255,255,0.2);
}

h1{
font-size:38px;
margin-bottom:10px;
background: linear-gradient(90deg,#00f2ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:18px;
opacity:0.85;
margin-bottom:20px;
}

#speechText{
width:90%;
padding:12px;
border-radius:10px;
border:none;
font-size:18px;
text-align:center;
margin-bottom:15px;
background:rgba(255,255,255,0.1);
color:white;
}

video{
width:430px;
margin-top:20px;
border-radius:12px;
box-shadow:0 0 25px cyan;
transition:0.3s;
}

.mirror{
transform:scaleX(-1);
}

button{
padding:12px 18px;
border-radius:10px;
border:none;
font-size:18px;
margin:8px;
cursor:pointer;
}

.mic{
background:linear-gradient(45deg,#00f2ff,#00ff95);
color:black;
}

.stop{
background:#ff3b3b;
color:white;
}

.toggle{
display:block;
margin:15px auto;
padding:14px 28px;
font-size:18px;
font-weight:bold;
border-radius:12px;
background:#222;
color:#00ffc8;
border:2px solid #00ffc8;
cursor:pointer;
}

.toggle.active{
background:#00ffc8;
color:black;
}

.toggleStatus{
font-size:14px;
opacity:0.9;
margin-bottom:10px;
}

.qrBox{
margin-top:25px;
display:none;
}

.qrBox img{
width:180px;
background:white;
padding:10px;
border-radius:10px;
}

.downloadBtn{
margin-top:10px;
padding:10px 20px;
background:linear-gradient(45deg,#00f2ff,#00ff95);
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Voice → ISL Live Translator</h1>

<p class="subtitle">
Speak and see sign language instantly
</p>

<input id="speechText" placeholder="Speech will appear here...">

<br>

<button class="mic" onclick="startListening()">
<i class="fa fa-microphone"></i> Start
</button>

<button class="stop" onclick="stopListening()">
<i class="fa fa-stop"></i> Stop & Generate QR
</button>

<button id="mirrorToggle" class="toggle" onclick="toggleMirror()">
🔁 Left-Hand Mode
</button>

<div class="toggleStatus" id="mirrorStatus">
Mirror Mode: OFF
</div>

<div>
<video id="signVideo" controls autoplay muted></video>
</div>

<div class="qrBox" id="qrBox">

<h3>Scan QR to watch compiled video</h3>

<img id="qrImage">

<br>

<a id="downloadQR" download>
<button class="downloadBtn">Download QR</button>
</a>

</div>

</div>

<script>

var speechRecognizer = new webkitSpeechRecognition();

var videoPlayer = document.getElementById("signVideo");
var textBox = document.getElementById("speechText");
var toggleBtn = document.getElementById("mirrorToggle");
var statusText = document.getElementById("mirrorStatus");

speechRecognizer.continuous = true;
speechRecognizer.interimResults = true;

/* ENABLE HINDI + ENGLISH */

speechRecognizer.lang = "hi-IN";

var spokenWords = [];

/* TRANSLATE TO ENGLISH */

async function translateToEnglish(text){

const url =
"https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q="
+ encodeURIComponent(text);

const res = await fetch(url);

const data = await res.json();

return data[0].map(x => x[0]).join("");

}

/* START LISTENING */

function startListening(){

speechRecognizer.start();

speechRecognizer.onresult = async function(event){

var transcript="";

for(var i=event.resultIndex;i<event.results.length;i++){
transcript += event.results[i][0].transcript;
}

/* TRANSLATE SPEECH */

var englishText = await translateToEnglish(transcript);

textBox.value = englishText;

var words = englishText.trim().toLowerCase().split(" ");

var lastWord = words[words.length-1];

if(!spokenWords.includes(lastWord)){
spokenWords.push(lastWord);
playSign(lastWord);
}

}

}

/* STOP + SEND TO FLASK */

async function stopListening(){

speechRecognizer.stop();

if(spokenWords.length===0){
alert("No speech detected");
return;
}

const response = await fetch("/api/compile",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
words:spokenWords
})

});

const data = await response.json();

document.getElementById("qrBox").style.display="block";

document.getElementById("qrImage").src=data.qr;

document.getElementById("downloadQR").href=data.qr;

spokenWords=[];

}

/* PLAY WORD VIDEO */

function playSign(word){

var videoPath="/videos/"+word+".mp4";

var tester=document.createElement("video");
tester.src=videoPath;

tester.onloadeddata=function(){

videoPlayer.src=videoPath;
videoPlayer.play();

};

tester.onerror=function(){

spellWord(word);

};

}

/* SPELL WORD */

function spellWord(word){

var letters=word.toUpperCase().split("");

var i=0;

function playNext(){

if(i>=letters.length) return;

videoPlayer.src="/videos/"+letters[i]+".mp4";
videoPlayer.play();

i++;

videoPlayer.onended=playNext;

}

playNext();

}

/* MIRROR TOGGLE */

function toggleMirror(){

videoPlayer.classList.toggle("mirror");

if(videoPlayer.classList.contains("mirror")){

toggleBtn.classList.add("active");
statusText.innerText="Mirror Mode: ON (Left Hand)";
localStorage.setItem("isl_mirror","true");

}else{

toggleBtn.classList.remove("active");
statusText.innerText="Mirror Mode: OFF";
localStorage.setItem("isl_mirror","false");

}

}

/* LOAD SAVED MIRROR */

window.onload=function(){

if(localStorage.getItem("isl_mirror")==="true"){

videoPlayer.classList.add("mirror");
toggleBtn.classList.add("active");
statusText.innerText="Mirror Mode: ON (Left Hand)";

}

}

</script>

</body>
</html>
