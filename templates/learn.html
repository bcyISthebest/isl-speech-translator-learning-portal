<!DOCTYPE html>
<html>

<head>
<title>Learning Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding-top:60px;
}

h1{
font-size:56px;
margin-bottom:50px;
background:linear-gradient(90deg,#00f2ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.levels{
width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:35px;
}

.level{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(0,255,255,0.25);
transition:0.3s;
}

.level:hover{
transform:scale(1.08);
box-shadow:0 0 45px cyan;
}

.level h2{
font-size:34px;
margin-bottom:15px;
}

.level p{
font-size:22px;
margin-bottom:15px;
opacity:0.9;
}

button{
padding:16px 35px;
font-size:22px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00f2ff,#00ff95);
cursor:pointer;
}

.back{
position:absolute;
left:30px;
top:30px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00f2ff,#00ff95);
cursor:pointer;
}

</style>

</head>

<body>

<button class="back" onclick="location.href='/'">⬅ Back</button>

<h1>Learn Indian Sign Language</h1>

<div class="levels">

<div class="level">
<h2>Level 1 — Alphabets</h2>
<p>Learn A-Z hand gestures</p>
<button onclick="location.href='/learn/alphabet'">Start</button>
</div>

<div class="level">
<h2>Level 2 — Basic Words</h2>
<p>Hello, Sorry, Thank You</p>
<button onclick="location.href='/learn/basic'">Start</button>
</div>

<div class="level">
<h2>Level 3 — Daily Words</h2>
<p>Food, Water, Help</p>
<button onclick="location.href='/learn/daily'">Start</button>
</div>

<div class="level">
<h2>Practice Mode</h2>
<p>Interactive Flashcards</p>
<button onclick="location.href='/flashcards'">Practice</button>
</div>

<div class="level">
<h2>Quiz Challenge</h2>
<p>Test your knowledge</p>
<button onclick="location.href='/quiz'">Play</button>
</div>

</div>

</body>
</html>
