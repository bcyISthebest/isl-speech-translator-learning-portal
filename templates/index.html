<!DOCTYPE html>
<html>
<head>

<title>Voice To ISL Converter</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.ai-glow{
position:absolute;
width:600px;
height:600px;
background: radial-gradient(circle,rgba(0,255,255,0.3),transparent);
filter:blur(120px);
animation: float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(-20px)}
to{transform:translateY(20px)}
}

.container{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border-radius:20px;
padding:40px;
width:520px;
text-align:center;
box-shadow:0 0 50px rgba(0,255,255,0.2);
border:1px solid rgba(255,255,255,0.1);
}

h1{
font-size:36px;
margin-bottom:10px;
background: linear-gradient(90deg,#00f2ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
font-size:18px;
opacity:0.85;
margin-bottom:30px;
}

#result1{
width:85%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
font-size:18px;
text-align:center;
background:rgba(255,255,255,0.1);
color:white;
box-shadow: inset 0 0 10px rgba(0,255,255,0.2);
margin-top:10px;
}

button{
padding:12px 18px;
border-radius:10px;
border:none;
font-size:18px;
margin:8px;
cursor:pointer;
transition:0.3s;
}

.mic{
background:linear-gradient(45deg,#00f2ff,#00ff95);
color:black;
box-shadow:0 0 15px #00f2ff;
}

.stop{
background:#ff3b3b;
color:white;
box-shadow:0 0 15px red;
}

.submit{
background:linear-gradient(45deg,#00f2ff,#00ff95);
color:black;
padding:10px 25px;
font-size:20px;
margin-top:15px;
}

.clear{
background:#444;
color:white;
padding:10px 25px;
font-size:20px;
}

.qr-info{
margin-top:15px;
font-size:14px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="ai-glow"></div>

<div class="container">

<img src="static/image.png" width="70">

<h1>Voice → Indian Sign Language</h1>

<p class="subtitle">AI Speech Recognition Interface</p>

<form action="/result" method="POST">

<label style="font-size:20px">Speech Input</label><br>

<input type="text" id="result1" name="Name" maxlength="200" required>

<br><br>

<button type="button" class="mic" onclick="startConverting()">
<i class="fa fa-microphone"></i>
</button>

<button type="button" class="stop" onclick="stopConverting()">
<i class="fa fa-stop"></i>
</button>

<br>

<input type="submit" value="Convert & Generate QR" class="submit">

<br>

<input type="button" value="Clear" onclick="clearText()" class="clear">

</form>

<p class="qr-info">
After conversion you will receive a QR code to share the sign video
</p>

</div>

<script>

var r = document.getElementById('result1');
var speechRecognizer = new webkitSpeechRecognition();

function startConverting(){

if('webkitSpeechRecognition' in window){

speechRecognizer.continuous = true;
speechRecognizer.interimResults = true;

speechRecognizer.start();

var finalTranscripts = '';

speechRecognizer.onresult = function(event){

var interimTranscripts = '';

for(var i = event.resultIndex; i < event.results.length; i++){

var transcript = event.results[i][0].transcript;

if(event.results[i].isFinal){
finalTranscripts += transcript;
}else{
interimTranscripts += transcript;
}

}

r.value = finalTranscripts + interimTranscripts;

};

}else{
r.value = "Speech recognition not supported";
}

}

function stopConverting(){
speechRecognizer.stop();
}

function clearText(){
r.value="";
stopConverting();
}

</script>

</body>
</html>
