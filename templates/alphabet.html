<!DOCTYPE html>
<html>

<head>
<title>Learn Alphabets</title>

<style>

body{
background:#0f2027;
color:white;
text-align:center;
font-family:Segoe UI;
}

h1{
font-size:50px;
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:35px;
padding:60px;
width:1000px;
margin:auto;
}

.card{
background:#203a43;
padding:25px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.card h2{
font-size:34px;
margin-bottom:10px;
}

video{
width:170px;
border-radius:10px;
}

button{
padding:16px 35px;
font-size:22px;
border:none;
border-radius:10px;
background:#00ffc8;
cursor:pointer;
margin-top:30px;
}

.back{
position:absolute;
left:30px;
top:30px;
}

</style>

</head>

<body>

<button class="back" onclick="location.href='/learn'">⬅ Back</button>

<h1>Learn Alphabet Signs</h1>

<div class="grid">

{% for letter in letters %}

<div class="card">

<h2>{{letter.letter}}</h2>

<video controls>
<source src="{{letter.video}}" type="video/mp4">
</video>

</div>

{% endfor %}

</div>

</body>
</html>
