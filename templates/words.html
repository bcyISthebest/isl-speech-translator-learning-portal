<!DOCTYPE html>
<html>

<head>

<title>Learn ISL</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding-top:40px;
}

h1{
font-size:38px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
width:900px;
margin:auto;
}

.card{
width:200px;
height:200px;
perspective:1000px;
cursor:pointer;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.6s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.front{
background:rgba(255,255,255,0.08);
font-size:22px;
}

.back{
background:#111;
transform:rotateY(180deg);
}

video{
width:160px;
border-radius:10px;
}

.backBtn{
position:absolute;
left:20px;
top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#00ffc8;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<h1>Tap Card To Learn</h1>

<div class="grid">

{% for item in words %}

<div class="card" onclick="flip(this)">
<div class="inner">

<div class="front">

<strong>{{item.word}}</strong>

</div>

<div class="back">

<video controls autoplay muted>
<source src="{{item.video}}" type="video/mp4">
</video>

</div>

</div>
</div>

{% endfor %}

</div>

<script>

function flip(card){

card.classList.toggle("flip")

}

</script>

</body>
</html>
