<!DOCTYPE html>
<html>

<head>

<title>Learn ISL</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding-top:40px;
}

h1{
font-size:50px;
margin-bottom:40px;
background:linear-gradient(90deg,#00f2ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
width:1100px;
margin:auto;
}

.card{
width:260px;
height:260px;
perspective:1000px;
cursor:pointer;
margin:auto;
}

.inner{
position:relative;
width:100%;
height:100%;
transition:transform 0.7s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.front, .back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
box-shadow:0 0 35px rgba(0,255,255,0.4);
}

.front{
background:rgba(255,255,255,0.08);
font-size:34px;
font-weight:bold;
letter-spacing:2px;
}

.back{
background:#111;
transform:rotateY(180deg);
padding:10px;
}

video{
width:210px;
border-radius:12px;
box-shadow:0 0 20px cyan;
}

.backBtn{
position:absolute;
left:20px;
top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00f2ff,#00ff95);
font-size:18px;
cursor:pointer;
}

.card:hover{
transform:scale(1.07);
}

</style>

</head>

<body>

<button class="backBtn" onclick="history.back()">⬅ Back</button>

<h1>Tap Card To Learn</h1>

<div class="grid">

{% for item in words %}

<div class="card" onclick="flip(this)">
<div class="inner">

<div class="front">

{{item.word}}

</div>

<div class="back">

<video controls autoplay muted>
<source src="{{item.video}}" type="video/mp4">
</video>

</div>

</div>
</div>

{% endfor %}

</div>

<script>

function flip(card){
card.classList.toggle("flip")
}

</script>

</body>
</html>
