<!doctype html>
<html>

<head>

<title>Voice To ISL Result</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

.ai-glow{
position:absolute;
width:600px;
height:600px;
background: radial-gradient(circle,rgba(0,255,255,0.3),transparent);
filter:blur(120px);
animation: float 6s infinite alternate;
}

@keyframes float{
from{transform:translateY(-20px)}
to{transform:translateY(20px)}
}

.container{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border-radius:20px;
padding:40px;
width:700px;
text-align:center;
box-shadow:0 0 50px rgba(0,255,255,0.2);
border:1px solid rgba(255,255,255,0.1);
}

h1{
font-size:40px;
margin-bottom:15px;
background: linear-gradient(90deg,#00f2ff,#00ff95);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.result-box{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:12px;
margin-top:20px;
font-size:18px;
}

.video-container{
margin-top:30px;
}

video{
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,255,0.4);
}

.qr-section{
margin-top:30px;
}

.qr-section img{
width:180px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,255,255,0.4);
}

.download-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:linear-gradient(45deg,#00f2ff,#00ff95);
color:black;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

button{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:linear-gradient(45deg,#00f2ff,#00ff95);
color:black;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px cyan;
}

</style>

</head>

<body>

<div class="ai-glow"></div>

<div class="container">

<img src="{{url_for('static', filename='image.png')}}" width="70">

<h1>Generated ISL Output</h1>

<div class="result-box">

{% for value in result.items() %}

<p><strong>{{ value[0] }} :</strong> {{ value[1] }}</p>

{% endfor %}

</div>


<div class="video-container">

<h3>Generated Sign Language Video</h3>

<video width="500" controls>

<source src="/videos/{{result1}}" type="video/mp4">

Your browser does not support video.

</video>

<br>

<a href="/videos/{{result1}}" download class="download-btn">
Download Video
</a>

</div>


<div class="qr-section">

<h3>Scan QR to open video</h3>

<img src="{{ url_for('static', filename=qr) }}" alt="QR Code">

<br>

<a href="{{ url_for('static', filename=qr) }}" download class="download-btn">
Download QR Code
</a>

</div>


<button onclick="location.href='/'">
Back to Converter
</button>

</div>

</body>
</html>
